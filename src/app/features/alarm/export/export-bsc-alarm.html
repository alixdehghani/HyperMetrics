<div id="export-anchor" class="inline-block">
    <button class="px-2 py-1 rounded-lg font-medium bg-blue-600 text-white hover:bg-blue-700 cursor-pointer text-sm"
    (click)="open()">
    📤 Export
</button>
</div>

@if (showFullscreen) {
    <div class="fixed inset-0 bg-black/50 backdrop-blur-xs flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-3xl p-6 relative">
            <h2 class="text-xl font-semibold mb-4">BSC Alarm Export</h2>
            
            <div class="flex flex-col gap-2">
                
                @if (allErrors.length > 0) {
                    <span class="bg-red-100 text-red-800 px-2 py-1 rounded text-xs">
            ⛔ There are {{ allErrors.length }} errors in the configuration.
          </span>
        }
        
        <button (click)="downloadAll()"
        class="px-2 py-1 rounded-lg font-medium bg-yellow-500 text-white hover:bg-yellow-600 cursor-pointer text-sm">
        📥 Download All
    </button>
    
    <button (click)="downloadHyperConfigFile()"
    class="px-2 py-1 rounded-lg font-medium bg-yellow-500 text-white hover:bg-yellow-600 cursor-pointer text-sm">
    📥 Download HyperConfig File
</button>

        <button (click)="downloadFlatFile()"
        class="px-2 py-1 rounded-lg font-medium bg-yellow-500 text-white hover:bg-yellow-600 cursor-pointer text-sm">
        📥 Download Flat File
    </button>
    
    <button (click)="downloadDocumentation()"
    class="px-2 py-1 rounded-lg font-medium bg-yellow-500 text-white hover:bg-yellow-600 cursor-pointer text-sm">
    📥 Download Documentation (HTML)
        </button>
    
        
       <button (click)="downloadYmlFile()"
  class="px-2 py-1 rounded-lg font-medium bg-yellow-500 text-white hover:bg-yellow-600 cursor-pointer text-sm">
  📥 Download YML File
</button> 
    </div>
    
    <button (click)="close()"
    class="absolute top-2 right-2 text-gray-500 hover:text-gray-700 text-xl font-bold">
    &times;
</button>
</div>
</div>
}
